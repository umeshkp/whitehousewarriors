schema: spec-driven

context: |
  Tech stack: Python 3, Streamlit UI, pytest, Google OAuth, Google Sheets API.
  Domain: Cricket scorekeeping with delivery-level persistence.
  Key rules:
  - An over has exactly 6 legal balls.
  - wides and no-balls add extras but are not legal balls.
  - striker/non-striker must belong to batting team roster.
  - bowler must belong to bowling team roster.
  - each new over requires explicit bowler selection.
  Persistence:
  - In authenticated mode, use append-only writes to Google Sheets.
  - In unauthenticated mode, persist scoring in local CSV with snapshot restore support.
  - Enforce fixed delivery header columns before appending data.
  Auth and identity:
  - Google login is optional; scoring must remain available without login.
  - Support popup-style Google account selection.
  - Accept all valid Google accounts (no domain restriction).
  - Display signed-in identity as name text only.

rules:
  proposal:
    - Keep proposal focused on what/why and include cricket-scoring constraints.
    - Explicitly list Google auth impacts and local CSV fallback impacts.
  design:
    - Document scoring-state transitions, especially over rollover and strike changes.
    - Include failure handling for invalid team-role selection, sheet access, and OAuth callback errors.
    - Specify behavior across auth modes (google-authenticated vs local-csv-fallback).
  specs:
    - Use SHALL language and include at least one WHEN/THEN scenario per requirement.
    - Capture roster constraints, legal-ball behavior, and persistence schema requirements.
    - Include requirements for optional login, auth persistence, and local CSV download flow where applicable.
  tasks:
    - Break tasks into small, verifiable steps.
    - Include both implementation and verification tasks for scoring logic, auth behavior, and persistence across both modes.
